version: '3.8'

services:
  devdocs:
    image: kaushik678/docsite:latest
    container_name: devdocs
    restart: unless-stopped
    ports:
      - "3110:3000"
    volumes:
      - devdocs-config:/app/config
      - devdocs-docs:/app/docs
      - devdocs-uploads:/app/docs/uploads
      - ./public:/app/public

volumes:
  devdocs-config:
  devdocs-docs:
  devdocs-uploads:
