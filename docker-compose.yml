version: '3.8'

services:
  devdocs:
    build: .
    container_name: devdocs
    ports:
      - "3100:3100"
    volumes:
      - ./docs:/app/docs
      - ./uploads:/app/uploads
      - ./trash:/app/trash
      - ./config:/app/config
      - ./.data-repo:/app/.data-repo
    environment:
      - PORT=3100
      - DOCS_DIR=/app/docs
      - UPLOADS_DIR=/app/uploads
      - GIT_REPO_URL=
      - SYNC_INTERVAL=5m
    restart: unless-stopped
