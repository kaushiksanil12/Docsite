services:
  docsite:
    image: ${DOCKER_USERNAME:-kaushik678}/docsite:latest
    container_name: docsite
    restart: unless-stopped
    ports:
      - "3100:3000"
    volumes:
      - docsite-config:/app/config
      - docsite-docs:/app/docs
      - docsite-uploads:/app/docs/uploads

volumes:
  docsite-config:
  docsite-docs:
  docsite-uploads:
