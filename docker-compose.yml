version: '3.8'

services:
  devdocs:
    build: .
    container_name: devdocs
    ports:
      - "3100:3100"
    volumes:
      - ./docs:/app/docs
      - ./uploads:/app/uploads
      - ./trash:/app/trash
      - ./config:/app/config
      - ./.data-repo:/app/.data-repo
    environment:
      - NODE_ENV=production
      - PORT=3100
    restart: unless-stopped
