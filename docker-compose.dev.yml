services:
  docsite:
    build:
      context: .
      network: host
    container_name: docsite
    restart: unless-stopped
    ports:
      - "3120:3000"
    volumes:
      - docsite-config:/app/config
      - docsite-docs:/app/docs
      - docsite-uploads:/app/docs/uploads
      - ./public:/app/public

volumes:
  docsite-config:
  docsite-docs:
  docsite-uploads:
